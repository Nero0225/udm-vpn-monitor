name: 'Setup Test Environment'
description: 'Install test dependencies and bats helper libraries'

inputs:
  install_kcov_deps:
    description: 'Install kcov build dependencies'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bats \
          parallel
        
        if [ "${{ inputs.install_kcov_deps }}" = "true" ]; then
          sudo apt-get install -y \
            jq \
            cmake \
            build-essential \
            libcurl4-openssl-dev \
            libelf-dev \
            libdw-dev \
            binutils-dev \
            libiberty-dev \
            zlib1g-dev \
            git
        fi

    - name: Install bats helper libraries
      shell: bash
      run: |
        cd tests
        if [ -f install_bats_helpers.sh ]; then
          bash install_bats_helpers.sh
        fi
