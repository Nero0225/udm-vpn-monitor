name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install shfmt
        run: |
          # Download and install shfmt binary
          SHFMT_VERSION="v3.8.0"
          if ! wget -q "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION#v}_linux_amd64" -O shfmt; then
            echo "::error::Failed to download shfmt"
            exit 1
          fi
          chmod +x shfmt
          sudo mv shfmt /usr/local/bin/shfmt
          shfmt --version

      - name: Run ShellCheck
        run: |
          shellcheck --version
          # Find all shell files excluding coverage, git, and bats helper directories
          find . -name "*.sh" -type f \
            -not -path "./coverage/*" \
            -not -path "./.git/*" \
            -not -path "./tests/bats-*/*" \
            | xargs shellcheck --severity=error || {
            echo "::error::ShellCheck found errors. Please fix them before merging."
            exit 1
          }

      - name: Check code formatting with shfmt
        run: |
          shfmt --version
          # Find all shell files excluding coverage, git, and bats helper directories
          if ! find . -name "*.sh" -type f \
            -not -path "./coverage/*" \
            -not -path "./.git/*" \
            -not -path "./tests/bats-*/*" \
            | xargs shfmt -d; then
            echo "::error::Code formatting issues detected. Please run 'shfmt -w' on the affected files to fix."
            exit 1
          fi

  test-coverage:
    name: Test Coverage (Group ${{ matrix.group }}/${{ matrix.total_groups }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
        total_groups: [4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          install_kcov_deps: true

      - name: Setup kcov
        uses: ./.github/actions/setup-kcov

      - name: Get test files for this group
        id: test_files
        run: |
          mapfile -t TEST_FILES < <(./scripts/split-tests-for-ci.sh ${{ matrix.group }} ${{ matrix.total_groups }})
          if [ ${#TEST_FILES[@]} -eq 0 ]; then
            echo "No test files for group ${{ matrix.group }}/${{ matrix.total_groups }}"
            echo "test_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "test_count=${#TEST_FILES[@]}" >> $GITHUB_OUTPUT
          printf '%s\n' "${TEST_FILES[@]}" > /tmp/test_files.txt
          echo "Test files for group ${{ matrix.group }}/${{ matrix.total_groups }}:"
          cat /tmp/test_files.txt

      - name: Run tests with coverage
        if: steps.test_files.outputs.test_count > 0
        env:
          RUN_SLOW_TESTS: 1
          PARALLEL_JOBS: 2
        run: |
          set -euo pipefail
          
          # Read test files for this group
          mapfile -t TEST_FILES < <(cat /tmp/test_files.txt)
          
          # Set up coverage directory for this group
          COVERAGE_DIR="coverage/group_${{ matrix.group }}"
          mkdir -p "$COVERAGE_DIR"
          
          # Get kcov arguments (same as test runner uses)
          KCOV_ARGS=(
            --include-path="$PWD/lib"
            --include-path="$PWD/scripts"
            --include-path="$PWD"
            --exclude-path="$PWD/tests"
            --exclude-path="$PWD/coverage"
            --exclude-path="$PWD/.git"
            --exclude-path="$PWD/logs"
            --exclude-path="$PWD/state"
            --exclude-path="$PWD/reports"
            --exclude-path="$PWD/analyze"
            --exclude-path="/usr"
            --exclude-path="/tmp"
          )
          
          # Track test failures
          FAILED_TESTS=()
          TIMED_OUT_TESTS=()
          
          # Run each test file with kcov
          # kcov automatically merges coverage when multiple runs output to the same directory
          for test_file in "${TEST_FILES[@]}"; do
            echo "Running with coverage: $(basename "$test_file")"
            # Use timeout to prevent hanging tests (120 seconds per test file)
            if timeout 120 kcov "${KCOV_ARGS[@]}" "$COVERAGE_DIR" bats --timing "$test_file"; then
              echo "✓ $(basename "$test_file") passed"
            else
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "✗ $(basename "$test_file") timed out after 120 seconds"
                TIMED_OUT_TESTS+=("$(basename "$test_file")")
              else
                echo "✗ $(basename "$test_file") failed with exit code $EXIT_CODE"
                FAILED_TESTS+=("$(basename "$test_file")")
              fi
            fi
          done
          
          # Report results
          echo ""
          echo "=== Test Results for Group ${{ matrix.group }}/${{ matrix.total_groups }} ==="
          echo "Total test files: ${#TEST_FILES[@]}"
          echo "Failed: ${#FAILED_TESTS[@]}"
          echo "Timed out: ${#TIMED_OUT_TESTS[@]}"
          
          if [ ${#FAILED_TESTS[@]} -gt 0 ]; then
            echo ""
            echo "Failed test files:"
            printf '  - %s\n' "${FAILED_TESTS[@]}"
          fi
          
          if [ ${#TIMED_OUT_TESTS[@]} -gt 0 ]; then
            echo ""
            echo "Timed out test files:"
            printf '  - %s\n' "${TIMED_OUT_TESTS[@]}"
          fi
          
          echo ""
          echo "Coverage directory: $COVERAGE_DIR"
          if [ -d "$COVERAGE_DIR" ]; then
            echo "Coverage files: $(find "$COVERAGE_DIR" -type f | wc -l)"
          fi
          
          # Fail the job if any tests failed or timed out
          if [ ${#FAILED_TESTS[@]} -gt 0 ] || [ ${#TIMED_OUT_TESTS[@]} -gt 0 ]; then
            echo "::error::Some tests failed or timed out in group ${{ matrix.group }}"
            exit 1
          fi

      - name: Upload coverage reports
        if: always() && steps.test_files.outputs.test_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: coverage-group-${{ matrix.group }}
          path: |
            coverage/group_${{ matrix.group }}/
          retention-days: 30
          if-no-files-found: ignore

  merge-coverage:
    name: Merge Coverage Reports
    runs-on: ubuntu-latest
    needs: [lint, test-coverage]
    timeout-minutes: 10
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          install_kcov_deps: true

      - name: Setup kcov
        uses: ./.github/actions/setup-kcov

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-group-*
          path: coverage-parts/
          merge-multiple: false

      - name: Merge coverage reports
        run: |
          set -euo pipefail
          
          # Find all coverage directories from each group
          COVERAGE_DIRS=()
          for artifact_dir in coverage-parts/coverage-group-*; do
            if [ -d "$artifact_dir" ]; then
              # Look for coverage/group_* directories inside the artifact
              for group_dir in "$artifact_dir"/coverage/group_*; do
                if [ -d "$group_dir" ]; then
                  COVERAGE_DIRS+=("$group_dir")
                fi
              done
            fi
          done
          
          if [ ${#COVERAGE_DIRS[@]} -eq 0 ]; then
            echo "Warning: No coverage directories found to merge"
            echo "Artifact structure:"
            find coverage-parts -type d 2>/dev/null | head -20 || true
            exit 0
          fi
          
          echo "Found ${#COVERAGE_DIRS[@]} coverage directory(ies) to merge:"
          printf '  %s\n' "${COVERAGE_DIRS[@]}"
          
          # Use kcov's built-in merge functionality
          echo "Merging coverage reports using kcov --merge..."
          kcov --merge coverage "${COVERAGE_DIRS[@]}"
          
          # Verify merged coverage
          if [ -d coverage ]; then
            echo "Coverage merged successfully"
            if [ -f coverage/index.html ] || [ -f coverage/index.js ] || [ -f coverage/index.json ]; then
              echo "Coverage report files found"
            else
              echo "Warning: Coverage report index files not found"
            fi
          else
            echo "Error: Coverage directory not created"
            exit 1
          fi

      - name: Generate coverage report
        run: |
          ./tests/generate_coverage_report.sh || true

      - name: Upload merged coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
          retention-days: 30
          if-no-files-found: ignore

      - name: Extract coverage percentage
        id: coverage
        if: always()
        run: |
          set +e  # Don't fail if coverage extraction fails
          
          if [ -f coverage/index.js ]; then
            # Extract coverage from kcov JavaScript report (v43+)
            # Check if grep supports -P (Perl regex)
            if grep --help 2>&1 | grep -q "\-P"; then
              COVERAGE=$(grep -oP 'var header = \{[^}]+\}' coverage/index.js 2>/dev/null | \
                grep -oP '"covered"\s*:\s*"?\K[0-9.]+' | head -1 || echo "")
              INSTRUMENTED=$(grep -oP 'var header = \{[^}]+\}' coverage/index.js 2>/dev/null | \
                grep -oP '"instrumented"\s*:\s*"?\K[0-9.]+' | head -1 || echo "")
            else
              # Fallback for systems without Perl regex support
              COVERAGE=$(grep -o '"covered"[[:space:]]*:[[:space:]]*"[0-9.]*"' coverage/index.js 2>/dev/null | \
                grep -o '[0-9.]*' | head -1 || echo "")
              INSTRUMENTED=$(grep -o '"instrumented"[[:space:]]*:[[:space:]]*"[0-9.]*"' coverage/index.js 2>/dev/null | \
                grep -o '[0-9.]*' | head -1 || echo "")
            fi
            
            if [ -n "$COVERAGE" ] && [ -n "$INSTRUMENTED" ] && [ "$INSTRUMENTED" != "0" ]; then
              PERCENT=$(awk "BEGIN {printf \"%.1f\", ($COVERAGE / $INSTRUMENTED) * 100}" 2>/dev/null || echo "N/A")
              if [ "$PERCENT" != "N/A" ]; then
                echo "percentage=$PERCENT" >> $GITHUB_OUTPUT
                echo "Coverage: $PERCENT%"
              fi
            fi
          elif [ -f coverage/index.json ] && command -v jq >/dev/null 2>&1; then
            # Extract coverage from JSON report (older kcov versions)
            PERCENT=$(jq -r '.merged_percent_covered' coverage/index.json 2>/dev/null || echo "N/A")
            if [ "$PERCENT" != "N/A" ] && [ "$PERCENT" != "null" ] && [ -n "$PERCENT" ]; then
              echo "percentage=$PERCENT" >> $GITHUB_OUTPUT
              echo "Coverage: $PERCENT%"
            fi
          else
            echo "Warning: Could not extract coverage percentage"
          fi
          
          set -e  # Re-enable error handling

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && steps.coverage.outputs.percentage && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.percentage }}';
            const comment = `## Test Coverage\n\nCoverage: **${coverage}%**\n\nView detailed coverage report in the workflow artifacts.`;
            
            // Find existing coverage comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## Test Coverage')
            );
            
            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  flaky-test-detection:
    name: Flaky Test Detection
    runs-on: ubuntu-latest
    needs: lint
    # Run on schedule (nightly) and on pull requests
    # Skip on push to avoid running on every commit (too expensive)
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          install_kcov_deps: false

      - name: Run flaky test detection
        id: flaky_detection
        env:
          RUN_SLOW_TESTS: 0  # Exclude slow tests for faster detection (can be overridden)
          NUM_RUNS: 3  # Run tests 3 times to detect flakiness
        run: |
          ./tests/detect_flaky_tests.sh --runs ${NUM_RUNS} || true
        continue-on-error: true

      - name: Upload flaky test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-results
          path: |
            logs/flaky_detection_*/
          retention-days: 30
          if-no-files-found: ignore

      - name: Report flaky tests
        if: always() && steps.flaky_detection.outputs.flaky_count && steps.flaky_detection.outputs.flaky_count != '0'
        run: |
          echo "::warning::Flaky tests detected! Check the flaky-test-results artifact for details."
          echo "Number of flaky tests: ${{ steps.flaky_detection.outputs.flaky_count }}"
          
          # Try to read and display flaky test summary
          if [ -d logs/flaky_detection_* ]; then
            RESULTS_DIR=$(ls -td logs/flaky_detection_* | head -1)
            if [ -f "$RESULTS_DIR/flaky_analysis.txt" ]; then
              echo ""
              echo "=== Flaky Test Summary ==="
              cat "$RESULTS_DIR/flaky_analysis.txt"
            fi
          fi

      - name: Comment flaky tests on PR
        if: github.event_name == 'pull_request' && steps.flaky_detection.outputs.flaky_count && steps.flaky_detection.outputs.flaky_count != '0'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const flakyCount = '${{ steps.flaky_detection.outputs.flaky_count }}';
            
            // Try to read flaky test details
            let flakyDetails = '';
            const { execSync } = require('child_process');
            try {
              const resultsDir = execSync('ls -td logs/flaky_detection_* | head -1', { encoding: 'utf-8' }).trim();
              const analysisFile = `${resultsDir}/flaky_analysis.txt`;
              const fs = require('fs');
              if (fs.existsSync(analysisFile)) {
                const content = fs.readFileSync(analysisFile, 'utf-8');
                // Extract just the flaky tests section
                const flakySection = content.match(/FLAKY TESTS.*?(?=\n\n|$)/s);
                if (flakySection) {
                  flakyDetails = '\n\n```\n' + flakySection[0] + '\n```';
                }
              }
            } catch (e) {
              // If we can't read details, just report the count
            }
            
            const comment = `## ⚠️ Flaky Test Detection\n\n` +
              `**${flakyCount} flaky test(s) detected** during ${process.env.NUM_RUNS || 3} test runs.` +
              `\n\nFlaky tests are tests that pass in some runs but fail in others, indicating unreliable tests that need fixing.` +
              `\n\nView detailed analysis in the workflow artifacts (flaky-test-results).` +
              flakyDetails;
            
            // Find existing flaky test comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## ⚠️ Flaky Test Detection')
            );
            
            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
