# UDM VPN Monitor Configuration
# Copy this file to /data/vpn-monitor/vpn-monitor.conf and customize

# Location-based VPN configuration
# Format: LOCATION_<NAME>_EXTERNAL="external_ip"
# Format: LOCATION_<NAME>_INTERNAL="internal_ip1 internal_ip2 ..."
# Location names are automatically extracted from variable names (text between LOCATION_ and _EXTERNAL)
# For locations with multiple internal IPs, VPN is considered healthy if ≥30% respond to pings
# Example:
#   LOCATION_NYC_EXTERNAL="203.0.113.1"
#   LOCATION_NYC_INTERNAL="192.168.1.1 192.168.1.88"
#   LOCATION_DC_EXTERNAL="203.0.113.2"
#   LOCATION_DC_INTERNAL="192.168.10.1 192.168.10.254 192.168.10.234"
#
# To migrate from old format (EXTERNAL_PEER_IPS/INTERNAL_PEER_IPS), use:
#   scripts/migrate-config-to-locations.sh
LOCATION_NYC_EXTERNAL=""
LOCATION_NYC_INTERNAL=""

# VPN connection identifier/name (optional, for logging)
VPN_NAME="Site-to-Site VPN"

# Failure threshold: number of consecutive failures before taking action
# NOTE: Each location has its own independent failure counter tracked in:
#   state/failure_counter_<location>_<peer_ip_sanitized>
# Failures are tracked separately per location, allowing independent recovery actions.
# Recovery of one location does not affect other locations' failure counters.
# Tier 1 (logging only) starts after TIER1_THRESHOLD failures for that location
# Tier 2 (surgical cleanup) starts after TIER2_THRESHOLD failures for that location
# Tier 3 (full restart - affects all tunnels) starts after TIER3_THRESHOLD failures for that location
TIER1_THRESHOLD=1
TIER2_THRESHOLD=3
TIER3_THRESHOLD=5

# Rate limiting configuration for Tier 3 restarts
# Prevents restart loops and excessive restarts while allowing flexible configuration

# Maximum Tier 3 restarts per window
# Maximum number of Tier 3 recovery actions (full IPsec restarts) allowed within the rate limit window
# This rate limit applies globally to all locations (not per-location)
# Range: 1-20 restarts
# Default: 20
MAX_RESTARTS_PER_WINDOW=20

# Rate limit window (minutes)
# Time window for the rate limit (sliding window - counts restarts in last N minutes from current time)
# Range: 5-1440 minutes (5 minutes to 24 hours)
# Default: 60 (1 hour)
# Examples:
#   15 = 15-minute window (allows rapid recovery during system-wide failures)
#   60 = 1-hour window (default, matches previous MAX_RESTARTS_PER_HOUR behavior)
#   120 = 2-hour window (more conservative)
RATE_LIMIT_WINDOW_MINUTES=60

# Minimum restart interval (seconds)
# Minimum time that must pass between consecutive Tier 3 restarts
# Prevents rapid-fire restarts even if within rate limit window
# Range: 0-300 seconds (0 = disabled, 5 minutes max)
# Default: 40
# Examples:
#   0 = No minimum spacing (allows all restarts to occur immediately if within window)
#   30 = 30-second minimum (allows rapid recovery but prevents thrashing)
#   40 = 40-second minimum (default, allows rapid recovery but prevents thrashing)
#   60 = 1-minute minimum (more conservative, gives tunnels more time to stabilize)
MIN_RESTART_INTERVAL_SECONDS=40

# Backward compatibility: MAX_RESTARTS_PER_HOUR is deprecated but still supported
# If set, it will be automatically migrated to MAX_RESTARTS_PER_WINDOW with RATE_LIMIT_WINDOW_MINUTES=60
# MAX_RESTARTS_PER_HOUR=3

# Log file location (must be in /data/ for persistence)
LOG_FILE="/data/vpn-monitor/logs/vpn-monitor.log"

# State directory (for counter files and lockfiles)
STATE_DIR="/data/vpn-monitor/state"

# Cron schedule (cron format: minute hour day month weekday)
# Controls how frequently the monitor runs checks
# Examples:
#   "*/1 * * * *"  = every 1 minute (default)
#   "*/5 * * * *"  = every 5 minutes
#   "*/10 * * * *" = every 10 minutes
#   "*/15 * * * *" = every 15 minutes
#   "0 * * * *"    = every hour (on the hour)
# Note: LOCKFILE_TIMEOUT should be longer than script execution time but shorter than cron interval
CRON_SCHEDULE="*/1 * * * *"

# Lockfile timeout (seconds)
# Maximum age of lockfile before considering it stale (hung process)
# Should be longer than normal script execution time but shorter than cron interval
# Default: 300 seconds (5 minutes) - provides buffer for script execution even with 1-minute cron
LOCKFILE_TIMEOUT=300

# Ping connectivity check
# Verifies actual connectivity through the tunnel, not just that SA exists
# Set to 1 to enable ping checks, 0 to disable (relies only on xfrm byte counters)
ENABLE_PING_CHECK=1

# Local UDM internal IP address (required when ENABLE_PING_CHECK=1 and location has internal IPs)
# This is the internal IP address of the local UDM device (typically on br0 interface)
# Used as the source IP for ping checks: ping -I <LOCAL_UDM_IP> <INTERNAL_IP>
# The script will automatically add this IP to br0 if needed: ip addr add <LOCAL_UDM_IP>/32 dev br0
# Example: LOCAL_UDM_IP="192.168.1.1"
# Note: If not configured, the installer will attempt to auto-detect from br0 interface
LOCAL_UDM_IP=""

# Ping count (number of packets to send)
PING_COUNT=3

# Ping timeout per packet (seconds)
PING_TIMEOUT=2

# VPN Keepalive Daemon
# Sends periodic ping traffic through VPN tunnels to keep them alive
# Set to 1 to enable keepalive daemon, 0 to disable
# Keepalive runs as a separate background process and pings peers at regular intervals
# This helps prevent idle VPN tunnels from timing out
# Default: 1 (enabled) - automatically installed and started during installation
ENABLE_KEEPALIVE=1

# Keepalive interval (seconds)
# How often to send keepalive pings through each VPN tunnel
# Default: 30 seconds (typical VPN keepalive requirement)
# Minimum recommended: 20 seconds
# Maximum recommended: 60 seconds
KEEPALIVE_INTERVAL=30

# Keepalive ping count (number of packets per keepalive ping)
# Default: 1 packet (minimal traffic for keepalive)
# Increase if single packet is not sufficient for your VPN setup
KEEPALIVE_PING_COUNT=1

# Enable debug logging (set to 1 for verbose output)
DEBUG=0

# xfrm-based per-connection recovery (enabled by default for UDM OS 4.3+)
# When enabled (ENABLE_XFRM_RECOVERY=1), Tier 2 and Tier 3 recovery will attempt
# xfrm-based per-connection recovery before falling back to ipsec reload/restart.
# This provides surgical per-connection recovery, affecting only the failing tunnel.
#
# For UDM OS 4.3+, this feature is production-ready and enabled by default.
# Set to 0 to disable if you prefer full tunnel restarts.
ENABLE_XFRM_RECOVERY=1

# Recovery verification timeout (seconds)
# Maximum time to wait for recovery verification after xfrm-based recovery actions
# The script will verify that the VPN tunnel has recovered after performing recovery actions
# Range: 10-300 seconds
# Default: 30
RECOVERY_VERIFY_TIMEOUT=30

# Network Partition Detection
# Detects when the local UDM's network connectivity is down (network partition).
# When network is partitioned, VPN checks are skipped since VPN recovery cannot succeed
# without network connectivity. VPN checks automatically resume when connectivity is restored.
#
# Network partition detection checks:
#   1. Default route exists (ip route show default)
#   2. DNS resolution works (dig/nslookup to public DNS server)
#   3. Critical interfaces are UP (ip link show)
#
# Set to 1 to enable network partition detection, 0 to disable
# Default: 1 (enabled)
ENABLE_NETWORK_PARTITION_CHECK=1

# Network partition DNS server
# DNS server to query for network partition detection
# Default: 8.8.8.8 (Google DNS)
NETWORK_PARTITION_DNS_SERVER="8.8.8.8"

# Network partition DNS hostname
# Hostname to resolve for network partition detection
# Default: google.com
NETWORK_PARTITION_DNS_HOSTNAME="google.com"

# Network partition DNS timeout (seconds)
# Timeout for DNS queries during network partition detection
# Range: 1-10 seconds
# Default: 2
NETWORK_PARTITION_DNS_TIMEOUT=2

# Network partition interfaces to check
# Comma-separated list of critical network interfaces to check
# All listed interfaces must be UP for network to be considered healthy
# Default: br0,eth0
NETWORK_PARTITION_INTERFACES="br0,eth0"

# Resource Monitoring
# Monitors CPU, RAM, and disk space usage and throttles execution if resources are constrained.
# When enabled, the script will exit early if CPU or RAM usage is high for a sustained period,
# and will log warnings and take action when disk space is low.
#
# Set to 1 to enable resource monitoring, 0 to disable
# Default: 1 (enabled)
ENABLE_RESOURCE_MONITORING=1

# CPU usage threshold (percentage)
# Script will throttle execution if CPU usage is at or above this threshold for RESOURCE_CPU_DURATION seconds
# Range: 50-100
# Default: 90
RESOURCE_CPU_THRESHOLD=90

# CPU constraint duration (seconds)
# CPU must be at RESOURCE_CPU_THRESHOLD or above for this duration before throttling
# Range: 10-600 seconds
# Default: 60
RESOURCE_CPU_DURATION=60

# RAM usage threshold (percentage)
# Script will throttle execution if RAM usage is at or above this threshold for RESOURCE_RAM_DURATION seconds
# Range: 50-100
# Default: 90
RESOURCE_RAM_THRESHOLD=90

# RAM constraint duration (seconds)
# RAM must be at RESOURCE_RAM_THRESHOLD or above for this duration before throttling
# Range: 10-600 seconds
# Default: 60
RESOURCE_RAM_DURATION=60

# Disk space warning threshold (percentage free)
# Script will log a warning when free disk space drops below this threshold
# Range: 5-50
# Default: 20
RESOURCE_DISK_WARNING_THRESHOLD=20

# Disk space critical threshold (percentage free)
# Script will throttle execution and take action (e.g., rotate logs) when free disk space drops below this threshold
# Range: 1-20
# Default: 10
RESOURCE_DISK_CRITICAL_THRESHOLD=10

# Status log interval (seconds)
# How often to log periodic status updates for healthy VPN peers
# This ensures monitoring activity is visible in logs even when VPNs are healthy
# Default: 300 seconds (5 minutes)
# Set to 0 to disable periodic status logging (only logs on failures/recoveries)
# Range: 0-3600 seconds (0 = disabled, max 1 hour)
STATUS_LOG_INTERVAL_SECONDS=300

# System-Wide Failure Detection
# Detects when all (or majority of) VPNs fail simultaneously, indicating an
# infrastructure-level issue rather than individual VPN problems. When detected,
# recovery is coordinated to prevent cascades and rate limiting.
#
# Set to 1 to enable system-wide failure detection, 0 to disable
# Default: 1 (enabled)
ENABLE_SYSTEM_WIDE_FAILURE_DETECTION=1

# System-wide failure threshold (percentage)
# Percentage of locations that must be failing simultaneously to trigger
# system-wide failure detection. This prevents false positives from individual
# VPN failures while catching infrastructure issues.
# Range: 0-100 (percentage)
# Default: 100 (all locations must fail)
# Examples:
#   100 = All locations must fail (most conservative, only triggers on complete outage)
#   80  = 80% of locations must fail (catches most infrastructure issues)
#   50  = 50% of locations must fail (more sensitive, may trigger on partial outages)
SYSTEM_WIDE_FAILURE_THRESHOLD=100

# Coordinate system-wide recovery
# When system-wide failure is detected, only one location will attempt recovery
# to prevent recovery cascades and rate limiting. The first location to check
# becomes the recovery coordinator.
# Set to 1 to enable coordination, 0 to disable (all locations attempt recovery)
# Default: 1 (enabled)
COORDINATE_SYSTEM_WIDE_RECOVERY=1
