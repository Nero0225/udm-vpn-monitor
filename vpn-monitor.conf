# UDM VPN Monitor Configuration
# Copy this file to /data/vpn-monitor/vpn-monitor.conf and customize

# External/Public peer IP address(es) to monitor (space-separated list)
# This should be the EXTERNAL/PUBLIC IP address(es) of the remote VPN gateway(s)
# This is the IP address used to establish the IPsec tunnel and check xfrm state
# Example: EXTERNAL_PEER_IPS="203.0.113.1 198.51.100.1"
EXTERNAL_PEER_IPS=""

# Internal/Private peer IP address(es) to monitor (space-separated list)
# This should be the INTERNAL/PRIVATE IP address(es) of the remote VPN gateway(s)
# This is the IP address used for ping connectivity checks through the tunnel
# Must match the order of EXTERNAL_PEER_IPS (first internal IP corresponds to first external IP)
# If empty, ping checks will use EXTERNAL_PEER_IPS instead
# Example: INTERNAL_PEER_IPS="192.168.100.1 192.168.200.1"
INTERNAL_PEER_IPS=""

# VPN connection identifier/name (optional, for logging)
VPN_NAME="Site-to-Site VPN"

# Per-peer connection name mapping (optional, for per-connection reloads)
# Allows Tier 2 surgical cleanup to reload only specific connections instead of all tunnels
# Format: CONNECTION_NAME_<sanitized_peer_ip>="connection-name"
# The sanitized peer IP replaces dots/colons with underscores
#
# IMPORTANT: Connection names MUST match actual connection names in your swanctl configuration.
# They are not arbitrary - they must exactly match what swanctl --list-conns shows.
# If you configure a name that doesn't exist, the reload will fail and fall back to reloading all connections.
#
# AUTO-DISCOVERY (RECOMMENDED): If not configured, the script automatically discovers connection names
# from swanctl --list-sas and caches them for future use. This ensures the name matches what swanctl has.
# Manual configuration is optional but can be useful for explicit control.
#
# To find connection names manually:
#   swanctl --list-conns    # List all configured connections
#   swanctl --list-sas      # List active SAs (shows connection names with peer IPs)
#
# Example (only use if you know the exact connection name from swanctl):
#   CONNECTION_NAME_203_0_113_1="site-to-site-1"
#   CONNECTION_NAME_198_51_100_1="remote-office-vpn"
#
# If connection names cannot be discovered or don't match, Tier 2 will reload all IPsec connections (affects all tunnels)
# CONNECTION_NAME_203_0_113_1=""
# CONNECTION_NAME_198_51_100_1=""

# Failure threshold: number of consecutive failures before taking action
# NOTE: Each peer IP has its own independent failure counter tracked in:
#   logs/failure_counter_<peer_ip_sanitized>
# Failures are tracked separately per peer, allowing independent recovery actions.
# Recovery of one peer does not affect other peers' failure counters.
# Tier 1 (logging only) starts after TIER1_THRESHOLD failures for that peer
# Tier 2 (surgical cleanup) starts after TIER2_THRESHOLD failures for that peer
# Tier 3 (full restart - affects all tunnels) starts after TIER3_THRESHOLD failures for that peer
TIER1_THRESHOLD=1
TIER2_THRESHOLD=3
TIER3_THRESHOLD=5

# Cooldown period after restart (minutes)
# Script will skip checks during cooldown to allow VPN to stabilize
COOLDOWN_MINUTES=15

# Maximum restarts per hour (rate limiting)
# Prevents restart loops if VPN has persistent issues
MAX_RESTARTS_PER_HOUR=3

# Log file location (must be in /data/ for persistence)
LOG_FILE="/data/vpn-monitor/logs/vpn-monitor.log"

# State directory (for counter files and lockfiles)
STATE_DIR="/data/vpn-monitor"

# Cron schedule (cron format: minute hour day month weekday)
# Controls how frequently the monitor runs checks
# Examples:
#   "*/1 * * * *"  = every 1 minute (default)
#   "*/5 * * * *"  = every 5 minutes
#   "*/10 * * * *" = every 10 minutes
#   "*/15 * * * *" = every 15 minutes
#   "0 * * * *"    = every hour (on the hour)
# Note: LOCKFILE_TIMEOUT should be longer than script execution time but shorter than cron interval
CRON_SCHEDULE="*/1 * * * *"

# Lockfile timeout (seconds)
# Maximum age of lockfile before considering it stale (hung process)
# Should be longer than normal script execution time but shorter than cron interval
# Default: 300 seconds (5 minutes) - provides buffer for script execution even with 1-minute cron
LOCKFILE_TIMEOUT=300

# Ping connectivity check
# Verifies actual connectivity through the tunnel, not just that SA exists
# Set to 1 to enable ping checks, 0 to disable (relies only on xfrm byte counters)
ENABLE_PING_CHECK=1

# Ping target IP address (DEPRECATED - use INTERNAL_PEER_IPS instead)
# IP to ping through the tunnel to verify connectivity
# If empty, uses INTERNAL_PEER_IPS (or EXTERNAL_PEER_IPS if INTERNAL_PEER_IPS not set)
# For better verification, configure INTERNAL_PEER_IPS instead (supports multiple peers)
# This verifies end-to-end connectivity through the tunnel, not just tunnel state
# Example: PING_TARGET_IP="192.168.100.1"
# NOTE: PING_TARGET_IP is deprecated. Use INTERNAL_PEER_IPS for per-peer internal IPs.
PING_TARGET_IP=""

# Ping count (number of packets to send)
PING_COUNT=3

# Ping timeout per packet (seconds)
PING_TIMEOUT=2

# Enable debug logging (set to 1 for verbose output)
DEBUG=0

# EXPERIMENTAL: xfrm-based per-connection recovery (disabled by default)
# ⚠️ WARNING: This is an EXPERIMENTAL feature with known risks:
#   - xfrm output format varies across kernel versions (parsing may fail)
#   - May not trigger IKE re-establishment automatically in all cases
#   - Risk of leaving orphaned SAs/policies if parsing fails
#   - Different behavior across kernel versions and UDM models
#   - Requires extensive testing (not yet fully validated)
#
# When enabled (ENABLE_XFRM_RECOVERY=1), Tier 2 recovery will attempt xfrm-based
# per-connection recovery when swanctl is unavailable, before falling back to ipsec reload.
# This provides surgical per-connection recovery without swanctl, but comes with risks.
#
# See architecture-docs/SWANCTL_ALTERNATIVES.md for detailed risk analysis.
# Only enable if you understand the risks and have tested on your system.
#
# Set to 1 to enable (EXPERIMENTAL), 0 to disable (default, recommended)
ENABLE_XFRM_RECOVERY=0

